host: 127.0.0.1:4455
info:
  contact: {}
  description: Prototype of FIMS
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: FIMS prototype
  version: '0.1'
paths:
  /sob/{sobId}/account-classes:
    get:
      consumes:
        - application/json
      description: List allowed account classes and their allowed groups
      parameters:
        - description: Sob ID
          in: path
          name: sobId
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            items:
              $ref: '#/definitions/http.AccountClass'
            type: array
      tags:
        - accounts
  /sob/{sobId}/account/{accountId}:
    get:
      consumes:
        - application/json
      description: Get an account by id
      parameters:
        - description: Sob ID
          in: path
          name: sobId
          required: true
          type: string
        - description: Account ID
          in: path
          name: accountId
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/http.AccountDetailResponse'
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_general_ledger_port_public_http.Error'
      tags:
        - accounts
    patch:
      consumes:
        - application/json
      description: Update account
      parameters:
        - description: Sob ID
          in: path
          name: sobId
          required: true
          type: string
        - description: Account ID
          in: path
          name: accountId
          required: true
          type: string
        - description: Update account request
          in: body
          name: UpdateAccountRequest
          required: true
          schema:
            $ref: '#/definitions/http.UpdateAccountRequest'
      produces:
        - application/json
      responses:
        '204':
          description: No Content
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_general_ledger_port_public_http.Error'
      tags:
        - accounts
  /sob/{sobId}/accounts:
    get:
      consumes:
        - application/json
      description: List all accounts
      parameters:
        - description: Sob ID
          in: path
          name: sobId
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            items:
              $ref: '#/definitions/http.AccountSlimResponse'
            type: array
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_general_ledger_port_public_http.Error'
      tags:
        - accounts
    post:
      consumes:
        - application/json
      description: Create account
      parameters:
        - description: Sob ID
          in: path
          name: sobId
          required: true
          type: string
        - description: Create account request
          in: body
          name: CreateAccountRequest
          required: true
          schema:
            $ref: '#/definitions/http.CreateAccountRequest'
      produces:
        - application/json
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/http.AccountDetailResponse'
        '500':
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_general_ledger_port_public_http.Error'
      tags:
        - accounts
